<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe & Inventory Auto-Deduction</title>
  <style>
    * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
    body { background-color: #f4f5f9; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .card { background: white; width: 100%; max-width: 500px; padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    h2, h3 { margin-top: 0; color: #111; }
    .btn { background-color: #4b00ff; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .log-screen { background: #111; color: #00ffcc; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; white-space: pre-wrap; min-height: 100px; }
    .inventory-list { font-family: monospace; background: #f8f9fc; padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Live Inventory</h2>
    <div id="inventory-display" class="inventory-list">Loading...</div>
  </div>

  <div class="card">
    <h2>POS Terminal (Simulated)</h2>
    <p>Tap a button to simulate a customer sale. Watch the inventory automatically deduct based on the recipe!</p>
    <button class="btn" onclick="processSale('grandpas_laphet_bowl')">Sell 1x Grandpa’s La phet Bowl</button>
    <button class="btn" onclick="processSale('pour_over_v60')">Sell 1x Pour Over v60</button>
  </div>

  <div class="card">
    <h3>System Log (AI & Operations)</h3>
    <div id="system-log" class="log-screen">System ready...</div>
  </div>

  <script>
    // 1. Master Inventory (Back of House)
    let inventory = {
      "tea_leaves_grams": 500,
      "mixed_nuts_grams": 300,
      "coffee_beans_grams": 250,
      "paper_filters_pcs": 50
    };

    // 2. The Recipe Keeper (The Formulas)
    const recipes = {
      "grandpas_laphet_bowl": {
        name: "Grandpa’s La phet Bowl",
        ingredients: { "tea_leaves_grams": 40, "mixed_nuts_grams": 20 }
      },
      "pour_over_v60": {
        name: "Pour Over v60",
        ingredients: { "coffee_beans_grams": 18, "paper_filters_pcs": 1 }
      }
    };

    // 3. Update the visual display
    function updateInventoryDisplay() {
      const display = document.getElementById('inventory-display');
      display.innerHTML = `
        Tea Leaves:   ${inventory.tea_leaves_grams}g <br>
        Mixed Nuts:   ${inventory.mixed_nuts_grams}g <br>
        Coffee Beans: ${inventory.coffee_beans_grams}g <br>
        V60 Filters:  ${inventory.paper_filters_pcs} pcs
      `;
    }

    // 4. The Core Logic: Deducting inventory on sale
    function processSale(productId) {
      const recipe = recipes[productId];
      let logMessage = `>> Order received: ${recipe.name}\n`;

      // Check if we have enough stock first
      let hasStock = true;
      for (const [ingredient, amountNeeded] of Object.entries(recipe.ingredients)) {
        if (inventory[ingredient] < amountNeeded) {
          hasStock = false;
          logMessage += `>> ERROR: Out of stock for ${ingredient.replace('_', ' ')}!\n`;
        }
      }

      if (hasStock) {
        // Subtract the ingredients
        for (const [ingredient, amountNeeded] of Object.entries(recipe.ingredients)) {
          inventory[ingredient] -= amountNeeded;
          logMessage += `   - Deducted ${amountNeeded} unit(s) of ${ingredient}\n`;
        }
        logMessage += `>> Sale complete. Inventory updated.\n`;
        
        // Mock AI Predictive Alert
        if (inventory.coffee_beans_grams < 100) {
          logMessage += `\n[AI ALERT] Coffee beans running low. Based on past weekend data, prep an extra 1kg batch today.\n`;
        }
      }

      document.getElementById('system-log').textContent = logMessage;
      updateInventoryDisplay();
    }

    // Initialize display on load
    updateInventoryDisplay();
  </script>

</body>
</html>
